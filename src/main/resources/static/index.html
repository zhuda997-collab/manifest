<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>货单管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-nav a { padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 13px; transition: background 0.2s; }
        .page-nav a:hover { background: var(--gray-300); }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区 -->
        <div class="header">
            <h1>📋 货单管理系统</h1>
            <p class="subtitle">Manifest Management System</p>
        </div>

        <!-- 页面导航 -->
        <div class="page-nav" style="display:flex;gap:8px;margin-bottom:16px;">
            <a href="index.html" style="padding:6px 14px;border-radius:8px;background:#2563eb;color:#fff;text-decoration:none;font-size:13px;">📋 货单管理</a>
            <a href="product.html" style="padding:6px 14px;border-radius:8px;background:#e5e7eb;color:#374151;text-decoration:none;font-size:13px;">🏭 产品管理</a>
            <a href="customer.html" style="padding:6px 14px;border-radius:8px;background:#e5e7eb;color:#374151;text-decoration:none;font-size:13px;">👥 客户管理</a>
        </div>

        <!-- 操作区 -->
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openModal('add')">➕ 新增货单</button>
            <button class="btn btn-secondary" onclick="loadData()">🔄 刷新数据</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索货品名称或编号..." oninput="handleSearch()">
            </div>
        </div>

        <!-- 统计区 -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">货品种类</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">总数量</span>
                <span class="stat-value" id="totalQuantity">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">总金额</span>
                <span class="stat-value" id="totalAmount">¥0.00</span>
            </div>
        </div>

        <!-- 表格区 -->
        <div class="table-wrapper">
            <table class="data-table" id="manifestTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>货品编号</th>
                        <th>货品名称</th>
                        <th>规格型号</th>
                        <th>单位</th>
                        <th>数量</th>
                        <th>单价(¥)</th>
                        <th>金额(¥)</th>
                        <th>备注</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row">
                        <td colspan="10">暂无数据，请点击「新增货单」添加</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页区 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 弹窗：新增 / 编辑 -->
    <div class="modal-overlay" id="formModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">新增货单</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="manifestForm" onsubmit="submitForm(event)">
                <input type="hidden" id="editId">
                <div class="form-row">
                    <div class="form-group">
                        <label>货品编号 <span class="required">*</span></label>
                        <input type="text" id="goodsNo" required maxlength="50" placeholder="例如：A001">
                    </div>
                    <div class="form-group">
                        <label>货品名称 <span class="required">*</span></label>
                        <input type="text" id="goodsName" required maxlength="200" placeholder="例如：不锈钢螺丝 M8×30">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>规格型号</label>
                        <input type="text" id="specification" maxlength="200" placeholder="例如：M8×30mm">
                    </div>
                    <div class="form-group">
                        <label>单位 <span class="required">*</span></label>
                        <input type="text" id="unit" required maxlength="20" placeholder="例如：个/箱/千克">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>数量 <span class="required">*</span></label>
                        <input type="number" id="quantity" required min="0" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>单价(¥) <span class="required">*</span></label>
                        <input type="number" id="unitPrice" required min="0" step="0.01" placeholder="0.00">
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>备注</label>
                    <textarea id="remark" maxlength="500" rows="3" placeholder="选填，最多500字"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 确认删除弹窗 -->
    <div class="modal-overlay" id="confirmModal" style="display: none;">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="modal-close" onclick="closeConfirm()">×</button>
            </div>
            <div class="modal-body">
                <p>确定要删除这条货单记录吗？此操作不可撤销。</p>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-cancel" onclick="closeConfirm()">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
