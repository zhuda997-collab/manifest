<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: var(--gray-100); }
        .page-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .page-nav a {
            padding: 6px 14px;
            border-radius: var(--radius);
            background: var(--gray-200);
            color: var(--gray-700);
            text-decoration: none;
            font-size: 13px;
            transition: background 0.2s;
        }
        .page-nav a:hover { background: var(--gray-300); }
        .page-nav a.active {
            background: var(--primary);
            color: #fff;
        }
        .data-table th:nth-child(3),
        .data-table td:nth-child(3) {
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 客户管理系统</h1>
            <p class="subtitle">Customer Management System</p>
        </div>

        <!-- 页面导航 -->
        <div class="page-nav">
            <a href="index.html">📋 货单管理</a>
            <a href="product.html">🏭 产品管理</a>
            <a href="customer.html" class="active">👥 客户管理</a>
        </div>

        <!-- 操作区 -->
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openModal('add')">➕ 新增客户</button>
            <button class="btn btn-secondary" onclick="loadData()">🔄 刷新数据</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索客户名或手机号..." oninput="handleSearch()">
            </div>
        </div>

        <!-- 统计区 -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">客户总数</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
        </div>

        <!-- 表格区 -->
        <div class="table-wrapper">
            <table class="data-table" id="customerTable">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>客户名</th>
                        <th>手机号</th>
                        <th>地址</th>
                        <th>创建时间</th>
                        <th>更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row">
                        <td colspan="8">暂无数据，请点击「新增客户」添加</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页区 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 弹窗：新增 / 编辑 -->
    <div class="modal-overlay" id="formModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">新增客户</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="customerForm" onsubmit="submitForm(event)">
                <input type="hidden" id="editId">
                <div class="form-group" style="margin-bottom: 14px;">
                    <label>客户名 <span class="required">*</span></label>
                    <input type="text" id="customerName" required maxlength="200" placeholder="例如：张三">
                </div>
                <div class="form-group" style="margin-bottom: 14px;">
                    <label>手机号</label>
                    <input type="text" id="phone" maxlength="20" placeholder="例如：13800138000">
                </div>
                <div class="form-group" style="margin-bottom: 14px;">
                    <label>地址</label>
                    <textarea id="address" maxlength="500" rows="2" placeholder="例如：湖北省武汉市洪山区..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 确认删除弹窗 -->
    <div class="modal-overlay" id="confirmModal" style="display: none;">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="modal-close" onclick="closeConfirm()">×</button>
            </div>
            <div class="modal-body">
                <p>确定要删除这个客户吗？此操作不可撤销。</p>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-cancel" onclick="closeConfirm()">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <script src="js/customer_app.js"></script>
</body>
</html>
