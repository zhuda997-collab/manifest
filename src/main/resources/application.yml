server:
  port: 8080

spring:
  application:
    name: manifest

  # MySQL 数据源配置（开发环境）
  datasource:
    url: jdbc:mysql://localhost:3306/manifest_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # 启动时自动执行 SQL 脚本（建表用）
  sql:
    init:
      mode: always
      encoding: UTF-8

# 日志配置
logging:
  level:
    com.example.manifest: DEBUG
    org.hibernate.SQL: DEBUG
